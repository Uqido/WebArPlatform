<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR.js Demo</title>
    <script src="/ar-libs/aframe-master.min.js"></script>
    <script src="/ar-libs/aframe-ar.js"></script>
    <script src="/ar-libs/aframe-extras.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
    >
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      //  Read params from URL
      const urlParams = new URLSearchParams(window.location.search);
      const markerType = urlParams.get("markerType");
      const markerUrl = urlParams.get("markerUrl");
      const modelUrl = urlParams.get("modelUrl");
      const scale = urlParams.get("scale") || "1 1 1";
      const rotation = urlParams.get("rotation") || "0 0 0";
      const position = urlParams.get("position") || "0 0 0";

      if (modelUrl && markerType) {
        const scene = document.querySelector("a-scene");

        // Create marker
        const marker = document.createElement("a-marker");
        if (markerType === "pattern") {
          marker.setAttribute("type", "pattern");
          marker.setAttribute("url", markerUrl);
        } else if (markerType === "preset") {
          marker.setAttribute("preset", markerUrl); // es: "hiro"
        }

        marker.addEventListener("markerFound", () => {
          window.parent.postMessage(
            { type: "MARKER_STATE", isFound: true },
            "*",
          );
        });

        marker.addEventListener("markerLost", () => {
          window.parent.postMessage(
            { type: "MARKER_STATE", isFound: false },
            "*",
          );
        });
        //  Create 3D entity
        const modelEntity = document.createElement("a-entity");

        // Animation management
        modelEntity.setAttribute("id", "ar-model");
        modelEntity.setAttribute(
          "animation-mixer",
          "clip: *; loop: repeat; crossFadeDuration: 0.3",
        );

        modelEntity.setAttribute("gltf-model", modelUrl);
        modelEntity.setAttribute("position", position);
        modelEntity.setAttribute("scale", scale);
        modelEntity.setAttribute("rotation", rotation);

        // Pass animation to the parent
        modelEntity.addEventListener("model-loaded", (e) => {
          const model = e.detail.model;
          if (model && model.animations && model.animations.length > 0) {
            const animNames = model.animations.map((anim) => anim.name);

            window.parent.postMessage(
              { type: "ANIMATIONS_LOADED", animations: animNames },
              "*",
            );
          }
        });

        marker.appendChild(modelEntity);
        scene.appendChild(marker);
      } else {
        console.warn("Missing AR paramaters in Iframe url.");
      }

      // Listener for messages to change animation
      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "CHANGE_ANIMATION") {
          const modelEl = document.getElementById("ar-model");
          const clipName = event.data.clip;

          if (modelEl) {
            // Set the new animation
            modelEl.setAttribute(
              "animation-mixer",
              `clip: ${clipName}; loop: repeat; crossFadeDuration: 0.3`,
            );
          } else {
            console.warn("Modello AR non ancora caricato o ID non trovato.");
          }
        }
      });
    </script>
  </body>
</html>
