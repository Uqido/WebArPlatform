<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR.js Demo</title>
    <!-- TODO: remove script fetch from web-->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item
          id="modello-card"
          src="/models/card_model/scene.gltf"
        ></a-asset-item>
        <a-asset-item
          id="modello-trex"
          src="/models/trex_model/scene.gltf"
        ></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="/marker_pattern/pattern-card.patt">
        <a-entity
          gltf-model="#modello-card"
          position="0 0 0"
          scale="0.0075 0.0075 0.0075"
          rotation="-90 0 0 "
        ></a-entity>
      </a-marker>

      <a-marker preset="hiro">
        <a-entity
          gltf-model="#modello-trex"
          position="0 0 0"
          scale="0.05 0.05 0.05"
          rotation="-90 0 0 "
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
