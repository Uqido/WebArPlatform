<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR.js Demo - Optimized Touch</title>
    <style>
      body,
      html {
        margin: 0;
        overflow: hidden;
        background-color: transparent;
        /* lock gesture from browser */
        touch-action: none;
      }
    </style>
    <script src="/ar-libs/aframe-master.min.js"></script>
    <script src="/ar-libs/aframe-ar.js"></script>
    <script src="/ar-libs/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <script>
      AFRAME.registerComponent("hitbox-interaction", {
        init: function () {
          // Usiamo 'click' che gestisce nativamente sia mouse che touch in A-Frame
          this.el.addEventListener("click", (e) => {
            e.stopPropagation();

            // 1. Disable gesture for all models
            document.querySelectorAll("[gesture-handler]").forEach((item) => {
              item.setAttribute("gesture-handler", "enabled", false);
            });

            // 2. Reset the color of ALL hitboxes back to red
            document.querySelectorAll("[hitbox-interaction]").forEach((box) => {
              box.setAttribute(
                "material",
                "color: red; wireframe: true; opacity: 0.5",
              );
            });

            // 3. Enable gesture for parent of the hitbox
            const parentModel = this.el.parentNode;
            if (parentModel && parentModel.hasAttribute("gesture-handler")) {
              parentModel.setAttribute("gesture-handler", "enabled", true);
            }

            // 4. Change the color of THIS specific hitbox to green (selected)
            this.el.setAttribute(
              "material",
              "color: green; wireframe: true; opacity: 0.8",
            );
          });
        },
      });
    </script>

    <script>
      const headParams = new URLSearchParams(window.location.search);
      const effectToLoad = headParams.get("particleEffectName");

      if (effectToLoad) {
        document.write(
          `<script src="/particles/${effectToLoad}.js"><\/script>`,
        );
      }
    </script>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      gesture-detector
    >
      <a-entity
        camera
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="objects: .clickable"
      >
      </a-entity>

      <a-marker preset="hiro" emitevents="true">
        <a-entity
          id="ar-model-tv"
          gltf-model="/models/tvanim/TV-anim.gltf"
          animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
          position="0 0 0"
          scale="1 1 1"
          rotation="0 0 0"
          gesture-handler="enabled: false; minScale: 0.1; maxScale: 10"
        >
          <a-box
            class="clickable"
            hitbox-interaction
            scale="1.2 1.2 1.2"
            position="0 0.5 0"
            material="color: red; wireframe: true; opacity: 0.5"
          ></a-box>
        </a-entity>
      </a-marker>
    </a-scene>

    <script>
      function parseUrlBoolean(value, defaultValue = false) {
        if (value === null) return defaultValue;
        return value.toLowerCase() === "true" || value === "1";
      }

      const urlParams = new URLSearchParams(window.location.search);
      const markerType = urlParams.get("markerType");
      const markerUrl = urlParams.get("markerUrl");
      const modelUrl = urlParams.get("modelUrl");
      const scale = urlParams.get("scale") || "1 1 1";
      const rotation = urlParams.get("rotation") || "0 0 0";
      const position = urlParams.get("position") || "0 0 0";
      const particleEffectName = urlParams.get("particleEffectName");
      const enableInteraction = urlParams.get("enableInteraction");

      if (modelUrl && markerType) {
        const scene = document.querySelector("a-scene");
        const marker = document.createElement("a-marker");

        if (markerType === "pattern") {
          marker.setAttribute("type", "pattern");
          marker.setAttribute("url", markerUrl);
        } else if (markerType === "preset") {
          marker.setAttribute("preset", markerUrl);
        }

        marker.setAttribute("emitevents", "true");

        marker.addEventListener("markerFound", () => {
          window.parent.postMessage(
            { type: "MARKER_STATE", isFound: true },
            "*",
          );
        });

        marker.addEventListener("markerLost", () => {
          window.parent.postMessage(
            { type: "MARKER_STATE", isFound: false },
            "*",
          );
        });

        const modelEntity = document.createElement("a-entity");
        modelEntity.setAttribute("id", "ar-model");
        modelEntity.setAttribute("gltf-model", modelUrl);
        modelEntity.setAttribute("position", position);
        modelEntity.setAttribute("scale", scale);
        modelEntity.setAttribute("rotation", rotation);
        modelEntity.setAttribute(
          "animation-mixer",
          "clip: *; loop: repeat; crossFadeDuration: 0.3",
        );

        // Interaction management con Hitbox
        if (parseUrlBoolean(enableInteraction, false)) {
          modelEntity.setAttribute(
            "gesture-handler",
            "enabled: false; minScale: 0.1; maxScale: 10",
          );

          // Create hitbox
          const hitbox = document.createElement("a-box");
          hitbox.setAttribute("class", "clickable");
          hitbox.setAttribute("hitbox-interaction", "");
          hitbox.setAttribute("scale", "1.2 1.5 1.2");
          hitbox.setAttribute("position", "0 0.5 0");
          hitbox.setAttribute(
            "material",
            "color: red; wireframe: true; opacity: 0.5",
          );

          modelEntity.appendChild(hitbox);
        }

        modelEntity.addEventListener("model-loaded", (e) => {
          const model = e.detail.model;
          if (model && model.animations && model.animations.length > 0) {
            const animNames = model.animations.map((anim) => anim.name);
            window.parent.postMessage(
              { type: "ANIMATIONS_LOADED", animations: animNames },
              "*",
            );
          }
        });

        marker.appendChild(modelEntity);
        scene.appendChild(marker);

        if (particleEffectName) {
          const addParticles = () => {
            const particleEntity = document.createElement("a-entity");
            particleEntity.setAttribute("id", "particle-system");
            particleEntity.setAttribute(particleEffectName, "");
            marker.appendChild(particleEntity);
          };
          if (scene.hasLoaded) addParticles();
          else scene.addEventListener("loaded", addParticles);
        }
      }

      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "CHANGE_ANIMATION") {
          const modelEl = document.getElementById("ar-model");
          if (modelEl) {
            modelEl.setAttribute(
              "animation-mixer",
              `clip: ${event.data.clip}; loop: repeat; crossFadeDuration: 0.3`,
            );
          }
        }
      });
    </script>
  </body>
</html>
