<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>AR.js NFT Dynamic</title>

    <script src="/ar-libs/aframe-master.min.js"></script>
    <script src="/ar-libs/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script>

    <script>
      AFRAME.registerComponent("print-reveal", {
        schema: {
          duration: { type: "number", default: 6000 }, // Durata in millisecondi (4 secondi)
          minZ: { type: "number", default: -1500 }, // Partenza dalla profondità (da calibrare)
          maxZ: { type: "number", default: 0 }, // Arrivo verso lo schermo (da calibrare)
        },
        init: function () {
          // Abilita il clipping in Three.js
          this.el.sceneEl.renderer.localClippingEnabled = true;

          // Crea il piano rivolto verso l'asse Z (profondità)
          // Se vuoi invertire l'effetto (che compare da davanti a dietro), cambia in (0, 0, 1)
          this.clipPlane = new THREE.Plane(
            new THREE.Vector3(0, 0, -1),
            this.data.minZ,
          );
          this.animating = false;

          // Applica il materiale di taglio quando il modello carica
          this.el.addEventListener("model-loaded", (e) => {
            const mesh = this.el.getObject3D("mesh");
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh && node.material) {
                  node.material.clippingPlanes = [this.clipPlane];
                  node.material.clipShadows = true;
                  node.material.needsUpdate = true;
                }
              });
            }
          });

          // Ascolta il segnale per far partire l'animazione
          this.el.addEventListener("start-reveal", () => {
            if (!this.animating) this.startAnimation();
          });
        },

        startAnimation: function () {
          this.animating = true;
          let startTime = Date.now();

          const animate = () => {
            let progress = (Date.now() - startTime) / this.data.duration;
            if (progress > 1) progress = 1;

            // Calcola la nuova posizione sulla profondità
            this.clipPlane.constant =
              this.data.minZ + (this.data.maxZ - this.data.minZ) * progress;

            // Continua finché non raggiunge 1 (100%)
            if (progress < 1) {
              requestAnimationFrame(animate);
            } else {
              this.animating = false;
            }
          };

          animate();
        },
      });
    </script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: transparent;
      }
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .arjs-loader div {
        text-align: center;
        color: white;
        font-size: 1.25em;
        font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div class="arjs-loader">
      <div>Caricamento descrittori immagine...</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: high; antialias: false; alpha: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;"
      gesture-detector
    >
      <a-nft
        id="nft-marker"
        smooth="true"
        smoothCount="30"
        smoothTolerance="0.2"
        smoothThreshold="2"
        raycaster="objects: .clickable"
        emitevents="true"
        cursor="fuse: false; rayOrigin: mouse;"
      >
        <a-entity id="ar-model" print-reveal class="clickable"></a-entity>
        <a-box
          position="40 0 0"
          scale="100 100 100"
          material="color: red; opacity: 0.5;"
        ></a-box>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);

        const markerType = urlParams.get("markerType") || "nft";
        const markerUrl = urlParams.get("markerUrl");
        const modelUrl = urlParams.get("modelUrl");
        const scale = urlParams.get("scale") || "1 1 1";
        const rotation = urlParams.get("rotation") || "0 0 0";
        const position = urlParams.get("position") || "0 0 0";

        const marker = document.querySelector("#nft-marker");
        const modelEntity = document.querySelector("#ar-model");

        if (marker && markerUrl) {
          marker.setAttribute("type", markerType);
          marker.setAttribute("url", markerUrl);
        }

        if (modelEntity && modelUrl) {
          modelEntity.setAttribute("gltf-model", modelUrl);
          modelEntity.setAttribute("scale", scale);
          modelEntity.setAttribute("rotation", rotation);
          modelEntity.setAttribute("position", position);
        }

        if (marker) {
          marker.addEventListener("markerFound", () => {
            window.parent.postMessage(
              { type: "MARKER_STATE", isFound: true },
              "*",
            );
          });
          marker.addEventListener("markerLost", () => {
            window.parent.postMessage(
              { type: "MARKER_STATE", isFound: false },
              "*",
            );
          });
        }

        if (modelEntity) {
          modelEntity.addEventListener("model-loaded", (e) => {
            const model = e.detail.model;
            if (model?.animations?.length > 0) {
              const animNames = model.animations.map((a) => a.name);
              window.parent.postMessage(
                { type: "ANIMATIONS_LOADED", animations: animNames },
                "*",
              );
            }
          });
        }
      });

      window.addEventListener("message", (event) => {
        if (event.data?.type === "CHANGE_ANIMATION") {
          const modelEl = document.getElementById("ar-model");
          if (modelEl) {
            modelEl.removeAttribute("animation-mixer");
            setTimeout(() => {
              modelEl.setAttribute("animation-mixer", {
                clip: event.data.clip,
                loop: "once",
                clampWhenFinished: true,
                crossFadeDuration: 0.0,
              });
            }, 10);

            modelEl.emit("start-reveal");
          }
        }
      });
    </script>
  </body>
</html>
