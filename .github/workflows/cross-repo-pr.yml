name: Create PR on Target Repository

on:
  push:
    branches:
      - main # Triggers when a new commit is pushed to the source's main branch

jobs:
  sync-commit-and-pr:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source repo to extract the commit
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          path: source-repo
          fetch-depth: 2 # Required to generate a diff of the last commit

      # 2. Create a patch file of the last commit
      - name: Generate commit patch
        run: |
          cd source-repo
          git format-patch -1 HEAD --stdout > ../latest-commit.patch

      # 3. Checkout the target repo where the PR will be opened
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: Uqido/WebArPlatform_Public
          token: ${{ secrets.TARGET_REPO_PAT }}
          path: target-repo

      # 4. Apply the patch to the target repo
      - name: Apply patch
        run: |
          cd target-repo
          # --3way allows git to fall back to a 3-way merge if there are minor file drifts
          git apply --3way ../latest-commit.patch

      # 5. Create the Pull Request using the peter-evans action
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          path: target-repo
          token: ${{ secrets.TARGET_REPO_PAT }}
          commit-message: "Sync: Apply commit ${{ github.sha }} from source"
          branch: sync-commit-${{ github.sha }}
          title: "Automated PR: Sync latest commit from source"
          body: |
            This Pull Request was automatically generated by a GitHub Action.
            It applies the latest commit from the source repository.

            **Source Commit SHA:** `${{ github.sha }}`
          base: main
